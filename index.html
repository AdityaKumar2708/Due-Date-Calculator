<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Consumption Calculator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body> 

<div class="container">

  <!-- LEFT: INPUTS -->
  <div class="inputs">

    <h2>Inputs</h2>

    <label>System</label>
    <select id="system"></select>

    <label>Working Hours (per day)</label>
    <input type="range" id="hours" min="1" max="24" value="10">
    <span id="hoursVal">10</span>

    <label>Intensity (%)</label>
    <input type="range" id="intensity" min="1" max="100" value="50">
    <span id="intensityVal">50</span>
    <small id="dutyCycle"></small>

    <label>Working Days (per week)</label>
    <select id="days">
      <option value="1">1</option>
      <option value="2">2</option>
      <option value="3">3</option>
      <option value="4">4</option>
      <option value="5">5</option>
      <option value="6">6</option>
      <option value="7" selected>7</option>
    </select>

    <label>% of Oil</label>
    <input type="range" id="oilPercent" min="1" max="100" value="100">
    <span id="oilVal">100</span>

    <label>Last Service Date</label>
    <input type="date" id="lastDate">

  </div>

  <!-- RIGHT: OUTPUT -->
  <div class="outputs">

    <h2>Results</h2>

    <div class="result-box">
      <p>Monthly Consumption</p>
      <h3 id="monthly">0</h3>
    </div>

    <div class="result-box">
      <p>Usable Oil</p>
      <h3 id="usableOil">0</h3>
    </div>

    <div class="result-box highlight">
      <p>Days Remaining</p>
      <h1 id="daysRemaining">0</h1>
    </div>

    <div class="result-box highlight">
      <p>Next Service Date</p>
      <h3 id="nextDate">--</h3>
    </div>

    <div class="small-info">
      <p id="containerInfo"></p>
      <p id="remainingOil"></p>
    </div>

  </div>

</div>

<script src="app.js"></script>
</body>
</html>
